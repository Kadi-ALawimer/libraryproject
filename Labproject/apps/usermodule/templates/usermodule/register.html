<h2>Register</h2>

{% for message in messages %}
    <p>{{ message }}</p>
{% endfor %}

<form method="post">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username">
    <input type="password" name="password" placeholder="Password">

    <button type="submit">Register</button>
</form>

<a href="{% url 'login' %}">Login</a>
