<h2>Task 2</h2>
<h3>Publishers with Total Book Stock</h3>

<table border="1" cellpadding="8" cellspacing="0">
    <tr>
        <th>Publisher Name</th>
        <th>Location</th>
        <th>Total Stock</th>
    </tr>

    {% for obj in data %}
    <tr>
        <td>{{ obj.name }}</td>
        <td>{{ obj.location }}</td>
        <td>{{ obj.total_stock }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No data found</td>
    </tr>
    {% endfor %}
</table>
