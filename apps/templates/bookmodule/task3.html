<h2>Task 3</h2>
<h3>Oldest Book Date for Each Publisher</h3>

<table border="1" cellpadding="8" cellspacing="0">
    <tr>
        <th>Publisher Name</th>
        <th>Location</th>
        <th>Oldest Book Date</th>
    </tr>

    {% for obj in data %}
    <tr>
        <td>{{ obj.name }}</td>
        <td>{{ obj.location }}</td>
        <td>{{ obj.oldest_book }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No data found</td>
    </tr>
    {% endfor %}
</table>
