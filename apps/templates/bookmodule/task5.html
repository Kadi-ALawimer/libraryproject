<h2>Task 5</h2>
<h3>Publishers with Count of Highly Rated Books and Quantity</h3>

<table border="1" cellpadding="8" cellspacing="0">
    <tr>
        <th>Publisher Name</th>
        <th>Location</th>
        <th>Highly Rated Books</th>
        <th>Total Quantity</th>
    </tr>

    {% for obj in data %}
    <tr>
        <td>{{ obj.name }}</td>
        <td>{{ obj.location }}</td>
        <td>{{ obj.high_rated_books }}</td>
        <td>{{ obj.total_quantity }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No data found</td>
    </tr>
    {% endfor %}
</table>
