<h2>Students per City</h2>

<table border="1">
    <tr>
        <th>City</th>
        <th>Number of Students</th>
    </tr>

    {% for obj in data %}
    <tr>
        <td>{{ obj.address__city }}</td>
        <td>{{ obj.count }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="2">No data found</td>
    </tr>
    {% endfor %}
</table>
