<h1>Books List</h1>

<a href="/books/lab9_part1/addbook">Add New Book</a>

<table border="1">
<tr>
    <th>Title</th>
    <th>Price</th>
    <th>Quantity</th>
    <th>Update</th>
    <th>Rating</th>
    <th>Actions</th>
</tr>

{% for book in books %}
<tr>
    <td>{{ book.title }}</td>
    <td>{{ book.price }}</td>
    <td>{{ book.quantity }}</td>
    <td>{{ book.pubdate }}</td>
    <td>{{ book.rating }}</td>
    <td>
        <a href="/books/lab9_part1/editbook/{{ book.id }}">Edit</a>
        <a href="/books/lab9_part1/deletebook/{{ book.id }}">Delete</a>
    </td>
</tr>
{% endfor %}
</table>
