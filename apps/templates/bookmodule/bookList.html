<h2>Books List</h2>

<table border="1" cellpadding="8" cellspacing="0">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Edition</th>
    </tr>

    {% for obj in books %}
    <tr>
        <td>{{ obj.id }}</td>
        <td>{{ obj.title }}</td>
        <td>{{ obj.author }}</td>
        <td>{{ obj.price }}</td>
        <td>{{ obj.edition }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">No books found</td>
    </tr>
    {% endfor %}
</table>
